name: CI
on:
  push:
  pull_request:

jobs:
  reproduce:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Reproduce published values (no dependencies)
        run: python3 reproduce_values.py
      - name: Provenance check (committed outputs match a fresh deterministic run)
        run: python3 provenance.py --check
      - name: Install and run the assertion test-suite
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
          pytest -q
